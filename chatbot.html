<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f7; --bg2: #f3f1ed; --bg3: #eceae4;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
  --green: #3B6D11; --green-bg: #eaf3de;
  --radius: 10px; --radius-sm: 6px;
}
body {
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.chat {
  background: #fff; border: 0.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  display: flex; flex-direction: column;
  height: 620px; width: 100%; max-width: 480px;
}
.hdr {
  padding: 16px 20px 13px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.av {
  width: 42px; height: 42px; border-radius: 50%;
  border: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-style: italic; color: var(--text);
  background: var(--bg2); flex-shrink: 0;
}
.hi { flex: 1; }
.hn { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 300; letter-spacing: 0.02em; }
.hs { font-size: 10.5px; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 2px; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 10px; color: var(--green); border: 0.5px solid #639922; border-radius: 20px; padding: 3px 9px; }
.contact-btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 20px; padding: 5px 13px;
  cursor: pointer; transition: opacity .15s; letter-spacing: 0.03em;
}
.contact-btn:hover { opacity: .75; }
.msgs {
  flex: 1; overflow-y: auto; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.msg { display: flex; flex-direction: column; gap: 3px; max-width: 84%; }
.msg.bot { align-self: flex-start; }
.msg.usr { align-self: flex-end; }
.lbl { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
.msg.usr .lbl { text-align: right; }
.bbl { padding: 10px 14px; font-size: 13.5px; line-height: 1.7; color: var(--text); }
.msg.bot .bbl { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 4px 14px 14px 14px; white-space: pre-line; }
.msg.usr .bbl { background: var(--text); color: var(--bg); border-radius: 14px 4px 14px 14px; }
.typing { display: flex; gap: 5px; align-items: center; padding: 13px 14px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 4px 14px 14px 14px; width: fit-content; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: pulse 1.4s infinite; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.qrs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
.qr {
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 300;
  color: var(--text2); border: 0.5px solid var(--border2);
  background: #fff; border-radius: 20px; padding: 5px 12px;
  cursor: pointer; transition: all .15s;
}
.qr:hover { background: var(--bg2); color: var(--text); }
.inp-row {
  padding: 12px 16px 14px; border-top: 0.5px solid var(--border);
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.inp {
  flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
  background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px;
  padding: 9px 16px; color: var(--text); outline: none; transition: border-color .15s;
}
.inp::placeholder { color: var(--text3); }
.inp:focus { border-color: var(--border2); }
.sbtn {
  width: 34px; height: 34px; border-radius: 50%; background: var(--text);
  border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: opacity .15s; flex-shrink: 0;
}
.sbtn:hover { opacity: .72; }
.sbtn svg { width: 14px; height: 14px; fill: none; stroke: var(--bg); stroke-width: 2; stroke-linecap: round; }

/* ── Contact Modal ─────────────────────────────── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border-radius: var(--radius);
  padding: 28px; width: 100%; max-width: 400px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.14);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 300; margin-bottom: 4px;
}
.modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; line-height: 1.5; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 10.5px; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
}
.field input {
  width: 100%; background: var(--bg2);
  border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  padding: 9px 13px; font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 300; color: var(--text); outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--text); }
.field input.err { border-color: #a32d2d; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
  padding: 9px 18px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer;
}
.btn-send {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
  padding: 9px 20px; border-radius: var(--radius-sm);
  border: none; background: var(--text); color: #faf9f7; cursor: pointer;
  transition: opacity .15s;
}
.btn-send:hover { opacity: .78; }
.success-msg {
  text-align: center; padding: 10px 0 4px;
}
.success-icon { font-size: 28px; margin-bottom: 8px; }
.success-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; margin-bottom: 6px; }
.success-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }
</style>

const FALLBACK = {
  zh: ['你可以問我工作經歷、作品集、技能，或是怎麼聯絡我 😊', '我不太確定你的問題，試試問我關於設計流程或合作方式？'],
  en: ["Feel free to ask about my work, projects, skills, or how to get in touch!", "I didn't catch that — try asking about my portfolio, experience, or process."]
};
let fbIdx = 0;

function getReply(text) {
  const zh = isZh(text);
  const lower = text.toLowerCase();
  for (const entry of KB) {
    if (entry.keys.some(k => lower.includes(k))) {
      return zh ? entry.zh() : entry.en();
    }
  }
  const pool = FALLBACK[zh ? 'zh' : 'en'];
  return pool[fbIdx++ % pool.length];
}

// ── UI helpers ────────────────────────────────────────────────────────────
const msgsEl = document.getElementById('msgs');
const inp = document.getElementById('inp');
let busy = false;

const QUICK     = ['About Jay', '作品集', 'Skills', '聯絡方式'];
const QUICK_MSG = ['Tell me about yourself', '你做過哪些作品？', 'What are your skills?', '怎麼聯絡你？'];

function addMsg(role, text, showQR) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'bot' ? 'bot' : 'usr');
  const lbl = document.createElement('div');
  lbl.className = 'lbl';
  lbl.textContent = role === 'bot' ? P.name.split(' ')[0] : 'You';
  const bbl = document.createElement('div');
  bbl.className = 'bbl'; bbl.textContent = text;
  wrap.appendChild(lbl); wrap.appendChild(bbl);
  if (showQR) {
    const qrs = document.createElement('div'); qrs.className = 'qrs';
    QUICK.forEach((q, i) => {
      const b = document.createElement('button'); b.className = 'qr'; b.textContent = q;
      b.onclick = () => { qrs.remove(); send(QUICK_MSG[i]); };
      qrs.appendChild(b);
    });
    wrap.appendChild(qrs);
  }
  msgsEl.appendChild(wrap); msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const w = document.createElement('div'); w.className = 'msg bot'; w.id = 'typ';
  const t = document.createElement('div'); t.className = 'typing';
  for (let i = 0; i < 3; i++) { const d = document.createElement('div'); d.className = 'dot'; t.appendChild(d); }
  w.appendChild(t); msgsEl.appendChild(w); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping() { const t = document.getElementById('typ'); if (t) t.remove(); }

function send(text) {
  if (!text || busy) return;
  busy = true;
  addMsg('usr', text);
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg('bot', getReply(text));
    busy = false;
  }, 500 + Math.random() * 300);
}

function go() {
  const text = inp.value.trim();
  inp.value = '';
  inp.setAttribute('value', '');
  if (!text || busy) return;
  send(text);
}

// 同時監聽 keydown + keyup，確保各平台/瀏覽器都能觸發清空
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.stopPropagation();
    go();
  }
});
inp.addEventListener('keyup', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    inp.value = '';
  }
});
// 送出按鈕也確保清空
document.querySelector('.sbtn').addEventListener('mousedown', () => {
  const text = inp.value.trim();
  inp.value = '';
  if (!text || busy) return;
  send(text);
});

// ── Contact modal ─────────────────────────────────────────────────────────
function openContact() {
  document.getElementById('modal-form-view').style.display = 'block';
  document.getElementById('modal-success-view').style.display = 'none';
  ['c-name','c-company','c-email'].forEach(id => {
    document.getElementById(id).value = '';
    document.getElementById(id).classList.remove('err');
  });
  document.getElementById('modal-bg').classList.add('open');
}

function closeContact() {
  document.getElementById('modal-bg').classList.remove('open');
}

function handleBgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeContact();
}

function submitContact() {
  const name    = document.getElementById('c-name').value.trim();
  const company = document.getElementById('c-company').value.trim();
  const email   = document.getElementById('c-email').value.trim();
  let ok = true;
  ['c-name','c-company','c-email'].forEach(id => document.getElementById(id).classList.remove('err'));
  if (!name)                         { document.getElementById('c-name').classList.add('err');    ok = false; }
  if (!company)                      { document.getElementById('c-company').classList.add('err'); ok = false; }
  if (!email || !email.includes('@'))  { document.getElementById('c-email').classList.add('err');  ok = false; }
  if (!ok) return;

  // Show success screen
  document.getElementById('modal-form-view').style.display = 'none';
  document.getElementById('modal-success-view').style.display = 'block';

  // Also post a message in chat
  addMsg('bot', isZh(name) || isZh(company)
    ? `收到了！${name} 你好，我會盡快用 ${email} 聯繫你 😊`
    : `Got it, ${name}! I'll reach out to you at ${email} soon 😊`
  );
}

// Init
setTimeout(() => addMsg('bot', P.intro || CHATBOT_DATA.profile.intro, true), 300);
